    <script>
        // Add smooth scroll behavior for the arrow
        document.querySelector('.down-arrow').addEventListener('click', function(e) {
            e.preventDefault();
            const target = document.getElementById('about');
            const targetPosition = target.getBoundingClientRect().top + window.pageYOffset;
            const startPosition = window.pageYOffset;
            const distance = targetPosition - startPosition;
            const duration = 800; // Adjust duration as needed
            let startTime = null;
    
            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const run = ease(timeElapsed, startPosition, distance, duration);
                window.scrollTo(0, run);
                if (timeElapsed < duration) requestAnimationFrame(animation);
            }
    
            // Easing function for smooth animation
            function ease(t, b, c, d) {
                t /= d/2;
                if (t < 1) return c/2*t*t*t + b;
                t -= 2;
                return c/2*(t*t*t + 2) + b;
            }
    
            requestAnimationFrame(animation);
        });

    </script>
    

    <script>
        // Bubble Animation Script (FIXED VERSION)
        const canvas = document.getElementById('backgroundCanvas');
        const ctx = canvas.getContext('2d');
    
        // Canvas Setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    
        // Bubble Class
        class Bubble {
            constructor() {
                this.reset();
                this.radius = 20 + Math.random() * 30; // Larger bubbles
                this.baseHue = 180 + Math.random() * 20; // Cyan-blue color range
                this.opacity = 0.4 + Math.random() * 0.4; // Adjusted opacity
            }
    
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + this.radius * 2;
                this.vy = - (2 + Math.random() * 3); // Faster movement
                this.vx = (Math.random() - 0.5) * 1.5;
            }
    
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y < -this.radius * 2) this.reset();
            }
    
            draw() {
                // Glow Effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, `hsla(${this.baseHue}, 70%, 60%, ${this.opacity * 0.4})`);
                gradient.addColorStop(1, `hsla(${this.baseHue}, 70%, 60%, 0)`);
                ctx.fillStyle = gradient;
                ctx.fill();
    
                // Main Bubble
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.baseHue}, 70%, 60%, ${this.opacity})`;
                ctx.fill();
    
                // Highlight
                ctx.beginPath();
                ctx.arc(
                    this.x - this.radius/3,
                    this.y - this.radius/3,
                    this.radius/2.5,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = `hsla(0, 0%, 100%, ${this.opacity * 0.7})`;
                ctx.fill();
            }
        }
    
        // Create Bubbles
        const bubbles = Array.from({ length: 60 }, () => new Bubble());
    
        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });
            requestAnimationFrame(animate);
        }
    
        // Start Animation
        animate();
    </script>
